# boltic.yaml — serverless deploy (no custom Dockerfile)
# With no Dockerfile in repo, Boltic uses its built-in builder (system-generated Dockerfile).
app: "headless-react-starter"
region: "asia-south1"

handler: "handler.handler"
language: "nodejs/20"

# Use Boltic's built-in builder (no custom Dockerfile in repo)
build:
  builtin: dockerfile
  ignorefile: .gitignore

# Runtime env (set in Boltic console or here): DOMAIN or PROXY_TARGET for API proxy in handler.js
env:
  DOMAIN: "api.fynd.com"
