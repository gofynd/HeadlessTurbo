# boltic.yaml — container deploy: builds Dockerfile, runs server.js on port 8080.
app: "headless-react-starter"
region: "asia-south1"

build:
  dockerfile: Dockerfile
  ignorefile: .gitignore

env:
  PROXY_TARGET: "https://api.fynd.com"
  DOMAIN: "api.fynd.com"
  BUILD_ID: "turbo-proxy-v7-container-20260311"
  USE_PROXY: "true"
  PORT: "8080"
