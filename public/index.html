<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="preconnect" href="https://api.fynd.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fynd.com" crossorigin />
    <title>Turbo</title>
    <style>
      .turbo-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #fff;
      }
      .turbo-loader__spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e5e7eb;
        border-top-color: #111;
        border-radius: 50%;
        animation: turbo-spin 0.6s linear infinite;
      }
      @keyframes turbo-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="turbo-loader">
        <div class="turbo-loader__spinner"></div>
      </div>
    </div>
  </body>
</html>
